<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Bank Control Panel - Samanvaya</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            background: #0f172a;
            color: #e2e8f0;
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            padding: 24px;
        }
        .container { max-width: 1080px; margin: 0 auto; }
        h1 { font-size: 24px; margin-bottom: 8px; }
        .subtitle { color: #94a3b8; font-size: 14px; margin-bottom: 24px; }
        .status-bar {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #94a3b8;
        }
        .section-title {
            margin: 24px 0 12px;
            color: #94a3b8;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .batch-card, .ledger-card {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 16px;
            margin-bottom: 12px;
        }
        .top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 12px;
        }
        .title { font-size: 16px; font-weight: 800; }
        .muted { color: #94a3b8; font-size: 12px; }
        .amount { color: #38bdf8; font-size: 18px; font-weight: 900; }
        .actions { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
        button {
            border: 0;
            padding: 8px 14px;
            font-size: 13px;
            font-weight: 800;
            cursor: pointer;
        }
        button:hover { opacity: 0.86; }
        .btn-approve { background: #16a34a; color: #fff; }
        .btn-reject { background: #dc2626; color: #fff; }
        .btn-silent { background: #d97706; color: #fff; }
        .badge {
            display: inline-flex;
            padding: 3px 9px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
        }
        .badge-pending { background: #854d0e; color: #fde68a; }
        .badge-success { background: #166534; color: #bbf7d0; }
        .badge-failed { background: #991b1b; color: #fecaca; }
        .badge-partial { background: #9a3412; color: #fed7aa; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        th, td { border-top: 1px solid #334155; padding: 8px; text-align: left; }
        th { color: #94a3b8; font-size: 11px; text-transform: uppercase; }
        .right { text-align: right; }
        .empty {
            border: 1px dashed #334155;
            color: #64748b;
            padding: 44px 20px;
            text-align: center;
        }
        .mono { font-family: ui-monospace, SFMono-Regular, Consolas, monospace; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Mock Bank Control Panel</h1>
        <p class="subtitle">Approve or reject whole payout batches. Completed batches are persisted in the Mock Bank ledger for reconciliation.</p>

        <div class="status-bar" id="status-bar">Loading bank queue...</div>

        <div class="section-title">Pending Batches</div>
        <div id="pending-batches"></div>

        <div class="section-title">Processed Batch Ledger</div>
        <div id="bank-ledger"></div>
    </div>

    <script>
        const API = '';

        async function loadAll() {
            try {
                const [batchRes, ledgerRes] = await Promise.all([
                    fetch(`${API}/batches`),
                    fetch(`${API}/ledger`),
                ]);
                const batches = await batchRes.json();
                const ledger = await ledgerRes.json();
                const pending = batches.filter(batch => batch.status === 'PENDING');
                document.getElementById('status-bar').textContent =
                    `${pending.length} pending batches | ${ledger.length} processed batch ledger rows`;
                renderPendingBatches(pending);
                renderLedger(ledger);
            } catch (e) {
                document.getElementById('status-bar').textContent = 'Error loading bank queue: ' + e.message;
            }
        }

        function renderPendingBatches(items) {
            const el = document.getElementById('pending-batches');
            if (!items.length) {
                el.innerHTML = '<div class="empty">No pending batches. Execute a Samanvaya batch to see it here.</div>';
                return;
            }
            el.innerHTML = items.map(batch => `
                <div class="batch-card">
                    <div class="top">
                        <div>
                            <div class="title">${esc(batch.batch_code || batch.ledger_key)}</div>
                            <div class="muted mono">${esc(batch.ledger_key)}</div>
                            <div class="muted">${batch.transaction_count} payouts</div>
                        </div>
                        <div class="amount">NPR ${Number(batch.total_amount).toLocaleString('en-IN')}</div>
                    </div>
                    <span class="badge badge-pending">Pending</span>
                    <div class="actions">
                        <button class="btn-approve" onclick="approveBatch('${esc(batch.ledger_key)}')">Approve Batch</button>
                        <button class="btn-reject" onclick="rejectBatch('${esc(batch.ledger_key)}')">Reject Batch</button>
                    </div>
                    ${payoutTable(batch.payouts, true)}
                </div>
            `).join('');
        }

        function renderLedger(items) {
            const el = document.getElementById('bank-ledger');
            if (!items.length) {
                el.innerHTML = '<div class="empty">No processed bank ledger rows yet.</div>';
                return;
            }
            el.innerHTML = items.map(row => `
                <div class="ledger-card">
                    <div class="top">
                        <div>
                            <div class="title">${esc(row.batch_code || row.ledger_key)}</div>
                            <div class="muted mono">${esc(row.reference_number)}</div>
                            <div class="muted">${new Date(row.processed_at).toLocaleString()}</div>
                        </div>
                        <div>
                            <div class="amount">NPR ${Number(row.total_amount).toLocaleString('en-IN')}</div>
                            <span class="badge ${badgeClass(row.status)}">${esc(row.status)}</span>
                        </div>
                    </div>
                    ${payoutTable(row.payouts, false)}
                </div>
            `).join('');
        }

        function payoutTable(items, allowIndividual) {
            return `
                <table>
                    <thead>
                        <tr>
                            <th>Claim</th>
                            <th>Recipient</th>
                            <th class="right">Amount</th>
                            <th>Status</th>
                            ${allowIndividual ? '<th>Action</th>' : ''}
                        </tr>
                    </thead>
                    <tbody>
                        ${items.map(item => {
                            const metadata = item.metadata || {};
                            return `
                                <tr>
                                    <td class="mono">${esc(metadata.claim_code || item.ref_id)}</td>
                                    <td>${esc(item.recipient)}</td>
                                    <td class="right">NPR ${Number(item.amount).toLocaleString('en-IN')}</td>
                                    <td><span class="badge ${badgeClass(item.status)}">${esc(item.status)}</span></td>
                                    ${allowIndividual ? `<td>
                                        <button class="btn-approve" onclick="approve('${esc(item.ref_id)}')">Approve</button>
                                        <button class="btn-reject" onclick="reject('${esc(item.ref_id)}')">Reject</button>
                                        <button class="btn-silent" onclick="settleSilent('${esc(item.ref_id)}')">Silent</button>
                                    </td>` : ''}
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            `;
        }

        async function approveBatch(batchId) {
            await fetch(`${API}/batches/${batchId}/approve`, { method: 'POST' });
            loadAll();
        }

        async function rejectBatch(batchId) {
            await fetch(`${API}/batches/${batchId}/reject`, { method: 'POST' });
            loadAll();
        }

        async function approve(refId) {
            await fetch(`${API}/approve/${refId}`, { method: 'POST' });
            loadAll();
        }

        async function reject(refId) {
            await fetch(`${API}/reject/${refId}`, { method: 'POST' });
            loadAll();
        }

        async function settleSilent(refId) {
            await fetch(`${API}/settle-silent/${refId}`, { method: 'POST' });
            loadAll();
        }

        function badgeClass(status) {
            if (status === 'SUCCESS') return 'badge-success';
            if (status === 'FAILED') return 'badge-failed';
            if (status === 'PARTIAL') return 'badge-partial';
            return 'badge-pending';
        }

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s == null ? '' : String(s);
            return d.innerHTML;
        }

        loadAll();
        setInterval(loadAll, 3000);
    </script>
</body>
</html>
